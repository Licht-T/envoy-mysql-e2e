admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 8001
static_resources:
  listeners:
  # Port 3307: SSL Terminated — Envoy terminates TLS, upstream is plaintext.
  - name: mysql_ssl_terminate
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 3307
    filter_chains:
    - filters:
      - name: envoy.filters.network.mysql_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.mysql_proxy.v3.MySQLProxy
          stat_prefix: egress_mysql_ssl_term
          downstream_ssl: REQUIRE
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: mysql_tcp
          cluster: mysql_cluster
      transport_socket:
        name: "starttls"
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.starttls.v3.StartTlsConfig
          cleartext_socket_config:
          tls_socket_config:
            common_tls_context:
              tls_certificates:
                certificate_chain:
                  filename: /etc/envoy/certs/server-cert.pem
                private_key:
                  filename: /etc/envoy/certs/server-key.pem

  # Port 3308: No SSL — plain TCP proxy with MySQL sniffing, no TLS at all.
  - name: mysql_no_ssl
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 3308
    filter_chains:
    - filters:
      - name: envoy.filters.network.mysql_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.mysql_proxy.v3.MySQLProxy
          stat_prefix: egress_mysql_no_ssl
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: mysql_tcp_no_ssl
          cluster: mysql_cluster

  # Port 3310: SSL ALLOW — terminate SSL if client requests, accept cleartext otherwise.
  - name: mysql_ssl_allow
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 3310
    filter_chains:
    - filters:
      - name: envoy.filters.network.mysql_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.mysql_proxy.v3.MySQLProxy
          stat_prefix: egress_mysql_ssl_allow
          downstream_ssl: ALLOW
      - name: envoy.filters.network.tcp_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
          stat_prefix: mysql_tcp_ssl_allow
          cluster: mysql_cluster
      transport_socket:
        name: "starttls"
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.starttls.v3.StartTlsConfig
          cleartext_socket_config:
          tls_socket_config:
            common_tls_context:
              tls_certificates:
                certificate_chain:
                  filename: /etc/envoy/certs/server-cert.pem
                private_key:
                  filename: /etc/envoy/certs/server-key.pem

  clusters:
  - name: mysql_cluster
    type: STRICT_DNS
    dns_resolvers:
      - socket_address:
          address: 127.0.0.11
          port_value: 53
    load_assignment:
      cluster_name: mysql_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: mysql
                port_value: 3306
